<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Log Game - Teamfight Manager 2 League</title>
<link rel="icon" href="data:," />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="nav-root"></div>

  <main>
    <h1 class="page-title">Log a Game</h1>
    <p class="page-subtitle">Record a completed game's result and per-player stats. Admin only.</p>

    <div class="card">
      <h2 class="card-title">1. Matchup</h2>
      <div class="field-row">
        <div class="field">
          <label for="team-a">Team A</label>
          <select id="team-a"><option value="">Select team...</option></select>
        </div>
        <div class="field">
          <label for="team-b">Team B</label>
          <select id="team-b"><option value="">Select team...</option></select>
        </div>
        <div class="field">
          <label for="duration">Duration (minutes)</label>
          <input type="number" id="duration" min="0" step="0.1" placeholder="e.g. 32" />
        </div>
      </div>
      <div class="field">
        <label for="bracket-match">Link to tournament match (optional)</label>
        <select id="bracket-match"><option value="">None - regular season / friendly</option></select>
      </div>
      <div class="field">
        <label>Winner</label>
        <div class="field-row" id="winner-picker">
          <button type="button" class="btn" data-side="a" disabled>Select Team A first</button>
          <button type="button" class="btn" data-side="b" disabled>Select Team B first</button>
        </div>
      </div>
      <div class="field">
        <label for="notes">Notes (optional)</label>
        <textarea id="notes" rows="2" placeholder="e.g. Week 3, Game 2 of series"></textarea>
      </div>
    </div>

    <div class="card" id="rosters-card" style="display:none">
      <h2 class="card-title">2. Player Stats</h2>
      <p class="text-muted" style="font-size:0.85rem;margin-top:-10px">Check "Played" for each player who took part, then fill in their stats.</p>
      <div id="rosters-container"></div>
    </div>

    <div class="card">
      <button type="button" class="btn btn-primary" id="submit-btn" disabled>Save Game</button>
      <div id="submit-msg" class="form-msg"></div>
    </div>
  </main>

  <footer class="site-footer">Teamfight Manager 2 League &middot; Built with Supabase + GitHub Pages</footer>

  <script type="module" src="js/logGame.js"></script>
</body>
</html>
