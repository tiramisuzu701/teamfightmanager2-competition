<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Team - Teamfight Manager 2 League</title>
<link rel="icon" href="data:," />
<script>(function(){try{if(localStorage.getItem("tfm2_theme")==="light")document.documentElement.setAttribute("data-theme","light");}catch(e){}})();</script>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="nav-root"></div>

  <main>
    <div class="card" id="team-header">
      <div class="profile-header">
        <div id="team-logo-slot"></div>
        <div>
          <h1 class="page-title" id="team-name" style="margin-bottom:2px">Loading...</h1>
          <p class="page-subtitle" id="team-subtitle" style="margin:0">&nbsp;</p>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="stat-toggle-row">
        <h2 class="card-title" style="margin:0">Record</h2>
        <div style="min-width:200px">
          <select id="season-select"></select>
        </div>
      </div>
      <div id="team-record"><p class="empty-state">Loading...</p></div>
    </div>

    <div class="home-grid">
      <div class="card">
        <h2 class="card-title">Roster</h2>
        <div id="team-roster"><p class="empty-state">Loading...</p></div>
      </div>

      <div class="card">
        <h2 class="card-title">Recent Games</h2>
        <div id="team-recent-games"><p class="empty-state">Loading...</p></div>
      </div>
    </div>

    <div class="card">
      <h2 class="card-title">All-Time Head-to-Head</h2>
      <table>
        <thead><tr><th>Opponent</th><th class="text-right">W</th><th class="text-right">L</th><th class="text-right">Games</th></tr></thead>
        <tbody id="head-to-head-body"><tr><td colspan="4" class="empty-state">Loading...</td></tr></tbody>
      </table>
    </div>
  </main>

  <footer class="site-footer">Teamfight Manager 2 League &middot; Built with Supabase + GitHub Pages</footer>

  <script type="module" src="js/team.js"></script>
</body>
</html>
